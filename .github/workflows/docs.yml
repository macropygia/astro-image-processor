name: Deploy Docs

on:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  deploy_docs:
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install
      - run: |
          pnpm install
          pnpm run build
        working-directory: ./website
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./website/dist
      - uses: actions/deploy-pages@v5
