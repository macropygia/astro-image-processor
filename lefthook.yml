pre-commit:
  parallel: true
  jobs:
    - name: lint
      run: pnpm lint
      stage_fixed: true
    - name: oxfmt
      run: pnpm exec oxfmt --no-error-on-unmatched-pattern --write {staged_files}
      stage_fixed: true
    - name: oxlint
      exclude:
        - website/**
      run: pnpm exec oxlint --no-error-on-unmatched-pattern --fix --tsconfig ./tsconfig.json --type-aware --type-check {staged_files}
      stage_fixed: true
    - name: build-compression-worker
      glob:
        - src/api/workers/compressionWorker.ts
        - src/api/workers/applySharpProfiles.ts
        - src/api/utils/normalizePath.ts
        - src/api/utils/resolveSharpFormat.ts
        - scripts/build-compression-worker.mjs
      run: pnpm build:worker && git add src/api/workers/compressionWorker.js

pre-push:
  parallel: true
  jobs:
    - name: typecheck
      run: pnpm typecheck
    # - name: build
    #   run: pnpm build
    # - name: unit-test
    #   run: pnpm test:unit
    # - name: e2e-test
    #   run: pnpm test:e2e

commit-msg:
  parallel: false
  jobs:
    - name: commitlint
      run: pnpm exec commitlint --edit {1}
